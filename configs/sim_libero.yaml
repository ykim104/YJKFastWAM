# @package _global_

defaults:
  - train
  - override /task: libero_uncond_2cam224_1e-4
  - _self_

ckpt: null
gpu_id: 0

model:
  load_text_encoder: true
  skip_dit_load_from_pretrain: true
  action_dit_pretrained_path: null

EVALUATION:
  task_suite_name: libero_spatial
  task_id: 0
  num_trials: 50
  output_dir: ./evaluate_results/libero/${hydra:runtime.choices.task}/${now:%Y%m%d_%H%M%S}

  # Runtime behavior
  env_num: 1
  num_steps_wait: 30
  replan_steps: 10
  binarize_gripper: true
  use_action_ensembler: false
  visualize_future_video: false

  # Action inference
  action_horizon: null
  num_inference_steps: ${eval_num_inference_steps}
  sigma_shift: null
  text_cfg_scale: 1.0
  negative_prompt: ""
  rand_device: cpu
  tiled: false

  # Optional external inputs
  dataset_stats_path: null
  device: cuda

MULTIRUN:
  create_only: false
  task_file: null
  task_suite_names:
    - libero_10
    - libero_goal
    - libero_spatial
    - libero_object
  num_gpus: 8
  # 1 task per 80 GB GPU is the safe default for Wan2.2-TI2V-5B-based policies
  # (video expert ~5 B + action expert ~1 B = ~18 GB peak per eval process).
  # Override to 2 from the CLI (`MULTIRUN.max_tasks_per_gpu=2`) only for
  # smaller/half-loaded checkpoints; running 2 has tripped OOM and OOM-killer
  # SIGKILLs on shared 80 GB GPUs during checkpoint load / env init.
  max_tasks_per_gpu: 1

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
